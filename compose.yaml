name: ${IT464} # (0) กำหนดชื่อโปรเจคให้สอดคล้องกับ .env [4]

services:
  # 1. ฐานข้อมูล (Database)
  db-node:
    image: mariadb:10.6
    container_name: ${YOCHUWA_KATE}-db # (1.1) กำหนดชื่อคอนเทนเนอร์ให้สอดคล้องกับ .env [4]
    restart: always
    environment:
      MARIADB_DATABASE: ${TEST02_DB} # (1.2) กำหนดชื่อฐานข้อมูลให้สอดคล้องกับ .env [4]
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_pass # (1.3) เติมชื่อ Secret
      MARIADB_USER: ${DB_USER} # (1.4) กำหนดชื่อผู้ใช้ฐานข้อมูลให้สอดคล้องกับ .env [4]
      MARIADB_PASSWORD_FILE: /run/secrets/db_pass  # (1.5) เติมชื่อ Secret
    networks:
      - backend-zone  # (1.6) ต้องเชื่อมกับวงปิดสำหรับ DB
    volumes:
      - db-storage:/var/lib/mysql  # (1.7) เติมชื่อจาก Named Volume [9]
    secrets:
      - db_pass # (1.8) เติมชื่อ Secret ที่ประกาศด้านล่าง [10]

  # 2. ส่วนประมวลผล (Backend)
  backend-php:
    image: bitnami/php-fpm:latest
    container_name: ${YOCHUWA_KATE}-php # (2.1) กำหนดชื่อคอนเทนเนอร์ให้สอดคล้องกับ .env [4]
    volumes:
      - ./app:/var/www/html # (2.2) เติมชื่อโฟลเดอร์ที่เก็บไฟล์โค้ดของ Backend
    networks:
      - backend-zone
    ##secrets: # (2.3) ถ้าต้องการให้ Backend ใช้รหัสผ่านฐานข้อมูลจาก Secret ให้เปิดบรรทัดนี้และเติมชื่อ Secret ที่ประกาศด้านล่าง [10]
    ##  - db_pass # (2.4) เติมชื่อ Secret ที่ประกาศด้านล่าง [10] 

  # 3. ส่วนรับงานหน้าบ้าน (Web Proxy)
  web-server:
    image: nginx:latest # (3.1) เติมชื่อ Image ที่ต้องการใช้ เช่น nginx:latest
    container_name: ${YOCHUWA_KATE}-web # (3.2) กำหนดชื่อคอนเทนเนอร์ให้สอดคล้องกับ .env [4]
    volumes:
      - ./app:/var/www/html
    ports:
      - "${HTTP_PORT}:80"  # (3.3) กำหนดพอร์ตให้สอดคล้องกับ .env [4]
    configs:
      - source: my-nginx-conf # (3.4) เติมชื่อ Config ที่ประกาศด้านล่าง [10]
        target: /etc/nginx/conf.d/default.conf
    networks:
      - frontend-zone  # (3.5) เชื่อมกับผู้ใช้ภายนอก [2]
      - backend-zone
    depends_on:
      - db-node
      - backend-php # (3.6) เติมชื่อบริการ Backend ที่ประกาศด้านบน [2]

  # 4. ส่วนจัดการฐานข้อมูล (phpMyAdmin)
  pwm-tool:
    image: phpmyadmin:latest
    container_name: ${YOCHUWA_KATE}-pma # (4.1) กำหนดชื่อคอนเทนเนอร์ให้สอดคล้องกับ .env [4]
    environment:
      PMA_HOST: db-node # (4.2) เติมชื่อบริการฐานข้อมูลที่ประกาศด้านบน [1]
      PMA_PASSWORD_FILE: /run/secrets/db_pass # (4.3) เติมชื่อ Secret ที่ประกาศด้านล่าง [10]
    ports:
      - "${PMA_PORT}:80" # (4.4) กำหนดพอร์ตให้สอดคล้องกับ .env [4]
    networks:
      - frontend-zone
      - backend-zone # (4.5) เชื่อมกับวงปิดสำหรับ DB [2]
    secrets:
      - db_pass
    depends_on:
      - db-node

# 5. ส่วนประกาศทรัพยากรส่วนกลาง
networks: 
  frontend-zone:
    driver: bridge
  backend-zone:
    driver: bridge

volumes:
  db-storage: # (5.1) ชื่อ Named Volume ที่ใช้ให้ตรงกับด้านบน [9]

configs:
  my-nginx-conf:
    file: ./shift-nginx.conf # (5.2) เติมชื่อโฟลเดอร์ที่เก็บไฟล์คอนฟิก

secrets:
  db_pass:
    file: ./secrets/db_pass.txt # (5.3) เติมชื่อโฟลเดอร์และไฟล์ที่เก็บรหัสผ่านของฐานข้อมูล